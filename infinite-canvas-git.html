<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Cartographer - Git Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 280px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #0f3460;
        }

        #sidebar-header h1 {
            font-size: 18px;
            color: #e94560;
            margin-bottom: 8px;
        }

        #sidebar-header p {
            font-size: 12px;
            color: #888;
        }

        #sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-card {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #e94560;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }

        .commit-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .commit-item {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            background: #1a1a2e;
            cursor: pointer;
            transition: background 0.2s;
        }

        .commit-item:hover {
            background: #0f3460;
        }

        .commit-message {
            font-size: 13px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .commit-meta {
            font-size: 10px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        .author-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .author-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #1a1a2e;
            border-radius: 6px;
        }

        .author-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }

        .author-info {
            flex: 1;
        }

        .author-name {
            font-size: 13px;
        }

        .author-commits {
            font-size: 10px;
            color: #666;
        }

        .heatmap-container {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            max-width: 250px;
        }

        .heatmap-day {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: #1a1a2e;
        }

        .heatmap-day.level-1 { background: #1a4a1a; }
        .heatmap-day.level-2 { background: #2a7a2a; }
        .heatmap-day.level-3 { background: #3aaa3a; }
        .heatmap-day.level-4 { background: #4ada4a; }

        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a2e;
        }

        #canvas {
            position: absolute;
            transform-origin: 0 0;
        }

        .block {
            position: absolute;
            background: #2a2a4e;
            border: 2px solid #3a3a6e;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.4;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: grab;
            user-select: none;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        .block:hover {
            border-color: #e94560;
            box-shadow: 0 6px 12px rgba(233, 69, 96, 0.3);
            transform: translateY(-2px);
            z-index: 100;
        }

        .block.class {
            background: linear-gradient(135deg, #2a3a5e 0%, #3a4a6e 100%);
            border-color: #5a8ade;
            min-width: 180px;
        }

        .block.function {
            background: linear-gradient(135deg, #2a4a3e 0%, #3a5a4e 100%);
            border-color: #5adeae;
            min-width: 160px;
        }

        .block.method {
            background: linear-gradient(135deg, #3a2a4a 0%, #4a3a5a 100%);
            border-color: #ae5ade;
            font-size: 11px;
            padding: 8px;
        }

        .block.module {
            background: linear-gradient(135deg, #4a3a2a 0%, #5a4a3a 100%);
            border-color: #deae5a;
        }

        .block-connector {
            position: absolute;
            pointer-events: none;
        }

        .block-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            color: #fff;
        }

        .block-meta {
            font-size: 10px;
            color: #888;
        }

        .block-author {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            background: rgba(22, 33, 62, 0.9);
            border: 1px solid #0f3460;
            border-radius: 8px;
            overflow: hidden;
        }

        #minimap-canvas {
            width: 100%;
            height: 100%;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            padding: 10px 16px;
            background: #e94560;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: #d63650;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #search-box {
            width: 100%;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #fff;
            margin-bottom: 15px;
        }

        #search-box:focus {
            outline: none;
            border-color: #e94560;
        }

        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            margin-right: 4px;
        }

        .tag.python { background: #3776ab; }
        .tag.javascript { background: #f7df1e; color: #000; }
        .tag.typescript { background: #3178c6; }
        .tag.java { background: #ed8b00; }
        .tag.go { background: #00add8; }
        .tag.rust { background: #ce422b; }

        #timeline {
            height: 60px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            padding: 0 20px;
            overflow-x: auto;
        }

        .timeline-commit {
            min-width: 100px;
            padding: 8px;
            margin-right: 10px;
            background: #1a1a2e;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .timeline-commit:hover {
            background: #0f3460;
        }

        .timeline-commit.active {
            background: #e94560;
        }

        .timeline-hash {
            font-size: 10px;
            color: #888;
        }

        .timeline-date {
            font-size: 9px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading Code Map...</div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div id="sidebar-header">
                <h1>Code Cartographer</h1>
                <p>Git-Powered Code Visualization</p>
            </div>
            <div id="sidebar-content">
                <input type="text" id="search-box" placeholder="Search code...">

                <div class="section">
                    <div class="section-title">Statistics</div>
                    <div class="stat-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="stat-blocks">0</div>
                            <div class="stat-label">Blocks</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-connectors">0</div>
                            <div class="stat-label">Connections</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-commits">0</div>
                            <div class="stat-label">Commits</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-authors">0</div>
                            <div class="stat-label">Authors</div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Activity Heatmap</div>
                    <div class="heatmap-container" id="heatmap"></div>
                </div>

                <div class="section">
                    <div class="section-title">Recent Commits</div>
                    <div class="commit-list" id="commit-list"></div>
                </div>

                <div class="section">
                    <div class="section-title">Top Contributors</div>
                    <div class="author-list" id="author-list"></div>
                </div>
            </div>
        </div>

        <div id="timeline"></div>

        <div id="canvas-container">
            <div id="canvas"></div>
            <div id="minimap">
                <canvas id="minimap-canvas"></canvas>
            </div>
            <div id="controls">
                <button class="control-btn" onclick="zoomIn()">+ Zoom</button>
                <button class="control-btn" onclick="zoomOut()">- Zoom</button>
                <button class="control-btn" onclick="resetView()">Reset</button>
                <button class="control-btn" onclick="centerOnRoot()">Center</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let blocks = [];
        let connectors = [];
        let gitData = null;
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;

        const authorColors = [
            '#e94560', '#5dadeae', '#5a8ade', '#deae5a', 
            '#ae5ade', '#5ade5a', '#de5a5a', '#5adeae'
        ];

        const authorColorMap = {};

        function getAuthorColor(author) {
            if (!authorColorMap[author]) {
                const idx = Object.keys(authorColorMap).length % authorColors.length;
                authorColorMap[author] = authorColors[idx];
            }
            return authorColorMap[author];
        }

        function getAuthorInitials(author) {
            return author.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        async function init() {
            try {
                // Load all data
                const [boardResponse, gitResponse] = await Promise.all([
                    fetch('./code-map-board.json'),
                    fetch('./git-data.json')
                ]);

                const boardData = await boardResponse.json();
                blocks = boardData.blocks || [];
                connectors = boardData.connectors || [];

                if (gitResponse.ok) {
                    gitData = await gitResponse.json();
                }

                // Update UI
                updateStats();
                renderBlocks();
                renderGitData();
                renderTimeline();
                setupMinimap();
                setupSearch();
                setupControls();

                // Center view
                centerOnRoot();
                renderVisible();

                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #e94560;">Error loading data</div>
                    <div style="color: #888;">${error.message}</div>
                `;
            }
        }

        function updateStats() {
            document.getElementById('stat-blocks').textContent = blocks.length;
            document.getElementById('stat-connectors').textContent = connectors.length;
            
            if (gitData) {
                document.getElementById('stat-commits').textContent = 
                    gitData.recent_commits ? gitData.recent_commits.length : 0;
                document.getElementById('stat-authors').textContent = 
                    gitData.stats ? gitData.stats.top_authors.length : 0;
            }
        }

        function renderGitData() {
            if (!gitData) return;

            // Render heatmap
            const heatmapEl = document.getElementById('heatmap');
            if (gitData.heatmap) {
                for (let i = 0; i < 365; i++) {
                    const day = document.createElement('div');
                    day.className = 'heatmap-day';
                    
                    const heatmapData = gitData.heatmap;
                    if (heatmapData[i]) {
                        const count = heatmapData[i].count;
                        if (count >= 4) day.classList.add('level-4');
                        else if (count >= 2) day.classList.add('level-3');
                        else if (count >= 1) day.classList.add('level-2');
                        else if (count >= 0) day.classList.add('level-1');
                    }
                    heatmapEl.appendChild(day);
                }
            }

            // Render commits
            const commitList = document.getElementById('commit-list');
            if (gitData.recent_commits) {
                for (const commit of gitData.recent_commits.slice(0, 10)) {
                    const item = document.createElement('div');
                    item.className = 'commit-item';
                    item.innerHTML = `
                        <div class="commit-message">${commit.message}</div>
                        <div class="commit-meta">
                            <span>${commit.short_hash}</span>
                            <span>${commit.author}</span>
                        </div>
                    `;
                    item.onclick = () => highlightCommit(commit.hash);
                    commitList.appendChild(item);
                }
            }

            // Render authors
            const authorList = document.getElementById('author-list');
            if (gitData.stats && gitData.stats.top_authors) {
                for (const author of gitData.stats.top_authors.slice(0, 5)) {
                    const item = document.createElement('div');
                    item.className = 'author-item';
                    const color = getAuthorColor(author.name);
                    item.innerHTML = `
                        <div class="author-avatar" style="background: ${color}">${getAuthorInitials(author.name)}</div>
                        <div class="author-info">
                            <div class="author-name">${author.name}</div>
                            <div class="author-commits">${author.commits} commits</div>
                        </div>
                    `;
                    authorList.appendChild(item);
                }
            }
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            if (!gitData || !gitData.recent_commits) return;

            for (const commit of gitData.recent_commits.slice(0, 20)) {
                const item = document.createElement('div');
                item.className = 'timeline-commit';
                item.innerHTML = `
                    <div class="timeline-hash">${commit.short_hash}</div>
                    <div class="timeline-date">${commit.date?.split('T')[0]}</div>
                `;
                item.onclick = () => highlightCommit(commit.hash);
                timeline.appendChild(item);
            }
        }

        function renderBlocks() {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';

            for (const block of blocks) {
                const el = document.createElement('div');
                el.className = `block ${block.type || 'concept'}`;
                el.id = block.id;
                el.style.left = block.x + 'px';
                el.style.top = block.y + 'px';
                el.style.width = (block.width || 200) + 'px';
                el.style.height = (block.height || 80) + 'px';
                
                // Content
                let content = '';
                if (block.content) {
                    const lines = block.content.split('\n');
                    content = `<div class="block-title">${lines[0]}</div>`;
                    if (lines.length > 1) {
                        content += `<div class="block-meta">${lines.slice(1).join(' ').slice(0, 50)}</div>`;
                    }
                }
                el.innerHTML = content;

                // Git author badge (if available)
                if (block.node_id && gitData) {
                    const nodeId = block.node_id;
                    // Check if we have author info for this block
                    const author = getAuthorForBlock(nodeId);
                    if (author) {
                        const badge = document.createElement('div');
                        badge.className = 'block-author';
                        badge.style.background = getAuthorColor(author);
                        badge.textContent = getAuthorInitials(author);
                        el.appendChild(badge);
                    }
                }

                canvas.appendChild(el);
            }

            renderConnectors();
        }

        function getAuthorForBlock(nodeId) {
            // Try to find author from git blame or recent commits
            if (gitData && gitData.recent_commits && gitData.recent_commits.length > 0) {
                // Default to most recent author for now
                return gitData.recent_commits[0].author;
            }
            return null;
        }

        function renderConnectors() {
            const canvas = document.getElementById('canvas');
            
            for (const connector of connectors) {
                const fromBlock = document.getElementById(connector.from_id);
                const toBlock = document.getElementById(connector.to_id);
                
                if (!fromBlock || !toBlock) continue;

                const fromEl = fromBlock;
                const toEl = toBlock;
                
                const x1 = parseFloat(fromEl.style.left) + parseFloat(fromEl.style.width) / 2;
                const y1 = parseFloat(fromEl.style.top) + parseFloat(fromEl.style.height) / 2;
                const x2 = parseFloat(toEl.style.left) + parseFloat(toEl.style.width) / 2;
                const y2 = parseFloat(toEl.style.top) + parseFloat(toEl.style.height) / 2;

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.classList.add('block-connector');
                svg.style.position = 'absolute';
                svg.style.left = Math.min(x1, x2) + 'px';
                svg.style.top = Math.min(y1, y2) + 'px';
                svg.style.width = Math.abs(x2 - x1) + 'px';
                svg.style.height = Math.abs(y2 - y1) + 'px';
                svg.style.pointerEvents = 'none';
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1 - parseFloat(svg.style.left));
                line.setAttribute('y1', y1 - parseFloat(svg.style.top));
                line.setAttribute('x2', x2 - parseFloat(svg.style.left));
                line.setAttribute('y2', y2 - parseFloat(svg.style.top));
                line.setAttribute('stroke', getConnectorColor(connector.edge_type));
                line.setAttribute('stroke-width', '2');
                line.setAttribute('stroke-dasharray', connector.edge_type === 'dashed' ? '5,5' : 'none');
                
                svg.appendChild(line);
                canvas.appendChild(svg);
            }
        }

        function getConnectorColor(edgeType) {
            const colors = {
                'calls': '#5adeae',
                'inherits': '#ae5ade',
                'imports': '#deae5a',
                'contains': '#5a8ade',
                'references': '#888'
            };
            return colors[edgeType] || '#666';
        }

        function highlightCommit(hash) {
            // Highlight blocks modified in this commit
            document.querySelectorAll('.block').forEach(el => {
                el.style.opacity = '0.3';
            });
            
            document.querySelectorAll('.timeline-commit').forEach(el => {
                el.classList.remove('active');
            });
        }

        function setupMinimap() {
            const canvas = document.getElementById('canvas');
            const minimap = document.getElementById('minimap-canvas');
            const ctx = minimap.getContext('2d');

            minimap.width = 200;
            minimap.height = 150;

            function updateMinimap() {
                ctx.clearRect(0, 0, 200, 150);
                
                if (blocks.length === 0) return;

                const xs = blocks.map(b => b.x);
                const ys = blocks.map(b => b.y);
                const minX = Math.min(...xs);
                const maxX = Math.max(...xs);
                const minY = Math.min(...ys);
                const maxY = Math.max(...ys);

                const scaleX = 200 / (maxX - minX + 200);
                const scaleY = 150 / (maxY - minY + 200);

                ctx.fillStyle = '#e94560';
                for (const block of blocks) {
                    const x = (block.x - minX) * scaleX;
                    const y = (block.y - minY) * scaleY;
                    const w = (block.width || 50) * scaleX;
                    const h = (block.height || 30) * scaleY;
                    ctx.fillRect(x, y, Math.max(2, w), Math.max(2, h));
                }
            }

            updateMinimap();
        }

        function setupSearch() {
            const searchBox = document.getElementById('search-box');
            searchBox.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('.block').forEach(el => {
                    const text = el.textContent.toLowerCase();
                    el.style.display = text.includes(query) ? 'block' : 'none';
                });
            });
        }

        function setupControls() {
            const container = document.getElementById('canvas-container');
            
            container.addEventListener('mousedown', (e) => {
                if (e.target === container || e.target.id === 'canvas') {
                    isDragging = true;
                    lastX = e.clientX;
                    lastY = e.clientY;
                }
            });

            container.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const dx = e.clientX - lastX;
                    const dy = e.clientY - lastY;
                    offsetX += dx;
                    offsetY += dy;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    updateTransform();
                }
            });

            container.addEventListener('mouseup', () => {
                isDragging = false;
            });

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                scale *= delta;
                scale = Math.max(0.1, Math.min(5, scale));
                updateTransform();
            });
        }

        function updateTransform() {
            document.getElementById('canvas').style.transform = 
                `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }

        function zoomIn() {
            scale *= 1.2;
            updateTransform();
        }

        function zoomOut() {
            scale /= 1.2;
            updateTransform();
        }

        function resetView() {
            scale = 1;
            offsetX = 0;
            offsetY = 0;
            updateTransform();
        }

        function centerOnRoot() {
            if (blocks.length > 0) {
                const container = document.getElementById('canvas-container');
                const midX = blocks.reduce((sum, b) => sum + b.x, 0) / blocks.length;
                const midY = blocks.reduce((sum, b) => sum + b.y, 0) / blocks.length;
                offsetX = container.clientWidth / 2 - midX * scale;
                offsetY = container.clientHeight / 2 - midY * scale;
                updateTransform();
            }
        }

        function renderVisible() {
            // For now, render all blocks
            // In production, only render visible blocks based on viewport
        }

        // Initialize
        init();
    </script>
</body>
</html>
